<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXTSTEP - ค้นหาหลักสูตร TCAS ทั่วไทย</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
    <style>
        :root {
            --primary: #1e3a8a; --primary-light: #eff6ff; --accent: #3b82f6; 
            --success: #10b981; --warning: #f59e0b; --danger: #ef4444; 
            --bg: #f1f5f9; --card: #ffffff; --border: #e2e8f0; 
            --text-main: #0f172a; --text-muted: #475569;
        }

        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text-main); margin: 0; padding: 20px; line-height: 1.5; }
        .container { max-width: 1200px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 30px; }
        header h1 { color: var(--primary); font-size: 2.5rem; margin: 0 0 10px 0; letter-spacing: 1px; }
        header p { color: var(--text-muted); margin: 0; font-size: 1.1rem; }

        .control-panel { background: var(--card); padding: 25px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); margin-bottom: 30px; border: 1px solid var(--border); }
        .search-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; }
        .input-group { display: flex; flex-direction: column; gap: 8px; }
        .input-group label { font-size: 0.95rem; font-weight: 600; color: var(--text-muted); }
        .form-control { padding: 12px 16px; border: 1px solid var(--border); border-radius: 10px; font-size: 15px; background-color: #fff; color: var(--text-main); transition: all 0.2s ease; }
        .form-control:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15); }

        .results-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 20px; }
        .program-card { background: var(--card); border-radius: 16px; padding: 24px; border: 1px solid var(--border); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02); display: flex; flex-direction: column; justify-content: space-between; transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .program-card:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
        
        .card-header { border-bottom: 1px solid #f1f5f9; padding-bottom: 14px; margin-bottom: 14px; }
        .card-uni { font-size: 1.25rem; font-weight: 700; color: var(--primary); margin: 0 0 6px 0; }
        .card-campus { font-size: 0.9rem; color: var(--text-muted); display: flex; align-items: center; gap: 6px; }
        .card-body p { margin: 0 0 12px 0; }
        .card-major { font-weight: 700; color: var(--text-main); font-size: 1.15rem !important; }
        
        .badge-group { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
        .badge { padding: 6px 12px; border-radius: 8px; font-size: 0.85rem; font-weight: 600; width: fit-content; display: inline-flex; align-items: center; }
        .badge-faculty { background: var(--primary-light); color: var(--primary); }
        .badge-type { background: #fffbeb; color: #b45309; border: 1px solid #fef3c7; }

        .card-footer { margin-top: 20px; padding-top: 14px; border-top: 1px dashed var(--border); display: flex; justify-content: space-between; align-items: flex-end; }
        .fee-container { display: flex; flex-direction: column; }
        .fee-label { font-size: 0.8rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; margin-bottom: 2px; }
        .fee-value { font-size: 1.4rem; font-weight: 800; color: var(--danger); }
        .status-waiting { color: var(--warning); font-weight: 700; font-size: 0.95rem; }

        .loading, .no-data { grid-column: 1 / -1; text-align: center; padding: 60px; color: var(--text-muted); font-size: 1.2rem; background: var(--card); border-radius: 16px; border: 1px solid var(--border); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🎯 NEXTSTEP</h1>
        <p>ระบบค้นหาข้อมูลหลักสูตร ค่าเทอม TCAS สเกลใหญ่ (โหลดข้อมูลครบถ้วนทั่วไทย)</p>
    </header>

    <div class="control-panel">
        <div class="search-grid">
            <div class="input-group">
                <label for="searchUni">🏛️ ค้นหามหาวิทยาลัย / วิทยาเขต</label>
                <input type="text" id="searchUni" class="form-control" placeholder="เช่น ราชภัฏชัยภูมิ, มหาวิทยาลัยเชียงใหม่...">
            </div>
            
            <div class="input-group">
                <label for="searchMajor">🧬 ค้นหาสาขาวิชา (Super Search)</label>
                <input type="text" id="searchMajor" class="form-control" placeholder="เช่น ครุศาสตร์, วิศวกรรม, บัญชี...">
            </div>

            <div class="input-group">
                <label for="facultySelect">📁 เลือกกลุ่มคณะ</label>
                <select id="facultySelect" class="form-control">
                    <option value="all">แสดงทั้งหมด</option>
                    <option value="1">⚕️ แพทยศาสตร์</option>
                    <option value="2">⚙️ วิศวกรรมศาสตร์</option>
                    <option value="3">💻 เทคโนโลยีสารสนเทศ</option>
                    <option value="4">💼 พาณิชยศาสตร์ บัญชี และบริหารธุรกิจ</option>
                    <option value="5">📣 นิเทศศาสตร์</option>
                    <option value="6">📚 อักษร/ศิลปะ/สังคม/ครุศาสตร์</option>
                    <option value="7">⚖️ นิติศาสตร์</option>
                    <option value="8">🦁 รัฐศาสตร์</option>
                    <option value="9">🧪 วิทยาศาสตร์</option>
                    <option value="10">🧠 จิตวิทยา</option>
                    <option value="11">🌍 มนุญศาสตร์</option>
                    <option value="13">🦷 ทันตแพทยศาสตร์</option>
                    <option value="14">💊 เภสัชศาสตร์</option>
                    <option value="99">📌 คณะอื่นๆ / ทั่วไป</option>
                </select>
            </div>

            <div class="input-group">
                <label for="sortSelect">📊 จัดเรียงค่าเทอม</label>
                <select id="sortSelect" class="form-control">
                    <option value="default">ตามระบบ myTCAS</option>
                    <option value="fee-asc">ค่าเทอม: ต่ำสุด ➡️ สูงสุด</option>
                    <option value="fee-desc">ค่าเทอม: สูงสุด ➡️ ต่ำสุด</option>
                    <option value="uni-name">ชื่อมหาวิทยาลัย (ก-ฮ)</option>
                </select>
            </div>
        </div>
    </div>

    <div id="resultsContainer" class="results-grid">
        <div class="loading">กำลังเปิดระบบดึงข้อมูลแบบ Loop Stream ทั่วประเทศ... ⏳</div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://gegxhtqvkmarqznplbsw.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdlZ3hodHF2a21hcnF6bnBsYnN3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2NzI4MTUsImV4cCI6MjA5NzI0ODgxNX0.HxHkmbLib78POSTq_5BfMNu_1y6TcnX0vvLYTfaFdPM';
    
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let allProgramsData = [];

    // 📡 ฟังก์ชันดึงข้อมูลแบบ Pagination Loop
    async function fetchPrograms() {
        try {
            let page = 0;
            let pageSize = 1000;
            let hasMore = true;
            let combinedData = [];

            while (hasMore) {
                const { data, error } = await _supabase
                    .from('programs')
                    .select(`
                        id, major_name, program_type, tuition_fee, faculty_id,
                        universities!university_id ( name_th, campus_name ), 
                        faculties!faculty_id ( name_th )
                    `)
                    .range(page * pageSize, (page + 1) * pageSize - 1);

                if (error) throw error;

                combinedData = [...combinedData, ...data];

                if (data.length < pageSize) {
                    hasMore = false;
                } else {
                    page++;
                }
            }

            allProgramsData = combinedData;
            console.log("📥 โหลดสำเร็จแบบไร้ขีดจำกัด! ยอดรวมทั้งระบบ:", allProgramsData.length, "หลักสูตร");
            applyFiltersAndSort();
        } catch (error) {
            console.error("❌ Fetch Loop Error:", error);
            document.getElementById('resultsContainer').innerHTML = 
                '<div class="no-data" style="color:var(--danger); font-weight:700;">เกิดข้อผิดพลาดในการดึงข้อมูลแบบ Stream จาก Supabase</div>';
        }
    }

    function applyFiltersAndSort() {
        const searchUniText = document.getElementById('searchUni').value.toLowerCase().replace(/\s+/g, '').replace(/[ฎฏต]/g, 'ต');
        const searchMajorText = document.getElementById('searchMajor').value.toLowerCase().replace(/\s+/g, '');
        const selectedFaculty = document.getElementById('facultySelect').value;
        const sortType = document.getElementById('sortSelect').value;

        let filtered = allProgramsData.filter(item => {
            const dbUniName = (item.universities?.name_th || '').toLowerCase().replace(/\s+/g, '').replace(/[ฎฏต]/g, 'ต');
            const dbCampus = (item.universities?.campus_name || '').toLowerCase().replace(/\s+/g, '');
            
            const dbMajor = (item.major_name || '').toLowerCase().replace(/\s+/g, '');
            const dbFaculty = (item.faculties?.name_th || '').toLowerCase().replace(/\s+/g, '');
            const dbType = (item.program_type || '').toLowerCase().replace(/\s+/g, '');
            
            const matchUni = dbUniName.includes(searchUniText) || dbCampus.includes(searchUniText);
            const matchMajor = dbMajor.includes(searchMajorText) || dbFaculty.includes(searchMajorText) || dbType.includes(searchMajorText);
            
            const itemFacultyId = item.faculty_id ? item.faculty_id.toString() : '';
            const matchFaculty = selectedFaculty === 'all' || itemFacultyId === selectedFaculty;
            
            return matchUni && matchMajor && matchFaculty;
        });

        if (sortType === 'fee-asc') {
            filtered.sort((a, b) => {
                const feeA = a.tuition_fee || 0;
                const feeB = b.tuition_fee || 0;
                if (feeA === 0 && feeB !== 0) return 1;
                if (feeB === 0 && feeA !== 0) return -1;
                return feeA - feeB;
            });
        } else if (sortType === 'fee-desc') {
            filtered.sort((a, b) => (b.tuition_fee || 0) - (a.tuition_fee || 0));
        } else if (sortType === 'uni-name') {
            filtered.sort((a, b) => {
                const nameA = a.universities?.name_th || '';
                const nameB = b.universities?.name_th || '';
                return nameA.localeCompare(nameB, 'th');
            });
        }

        renderResults(filtered);
    }

    // 💡 ฟังก์ชันเรนเดอร์การ์ดผลลัพธ์พร้อมปุ่มดู Roadmap
    function renderResults(programs) {
        const container = document.getElementById('resultsContainer');
        container.innerHTML = '';

        if (programs.length === 0) {
            container.innerHTML = '<div class="no-data">🔍 ไม่พบข้อมูลที่คุณต้องการค้นหา (ลองปรับกลุ่มคณะเป็น "แสดงทั้งหมด" ดูก่อนนะครับ)</div>';
            return;
        }

        programs.forEach(item => {
            const uniName = item.universities?.name_th || 'ไม่ระบุสถาบัน';
            const campusName = item.universities?.campus_name || 'วิทยาเขตหลัก';
            const majorName = item.major_name || 'ทั่วไป/ไม่ระบุสาขา';
            const facultyName = item.faculties?.name_th || 'ไม่ระบุคณะ';
            const programType = item.program_type || 'ภาษาไทย ปกติ';
            
            let feeHTML;
            if (item.tuition_fee && item.tuition_fee > 0) {
                feeHTML = `
                    <div class="fee-container">
                        <span class="fee-label">ค่าเทอมโดยประมาณ</span>
                        <div class="fee-value">฿${Number(item.tuition_fee).toLocaleString()} <span style="font-size: 0.85rem; font-weight: normal; color: var(--text-muted);">/ เทอม</span></div>
                    </div>`;
            } else {
                feeHTML = '<span class="status-waiting" style="margin-bottom: 5px;">⏳ รอประกาศค่าใช้จ่าย</span>';
            }

            const card = document.createElement('div');
            card.className = 'program-card';
            card.innerHTML = `
                <div>
                    <div class="card-header">
                        <h3 class="card-uni">🏛️ ${uniName}</h3>
                        <div class="card-campus">📍 ${campusName}</div>
                    </div>
                    <div class="card-body">
                        <p class="card-major">📘 สาขา${majorName}</p>
                        <div class="badge-group">
                            <span class="badge badge-faculty">🧬 คณะ${facultyName}</span>
                            <span class="badge badge-type">✨ รูปแบบ: ${programType}</span>
                        </div>
                    </div>
                </div>
                <div class="card-footer">
                    ${feeHTML}
                    <a href="roadmap.html?id=${item.id}" style="background: var(--primary); color: white; padding: 10px 18px; border-radius: 10px; text-decoration: none; font-size: 0.95rem; font-weight: bold; transition: 0.2s; box-shadow: 0 4px 6px -1px rgba(30, 58, 138, 0.2); white-space: nowrap;">ดู Roadmap 🗺️</a>
                </div>
            `;
            container.appendChild(card);
        });
    }

    document.getElementById('searchUni').addEventListener('input', applyFiltersAndSort);
    document.getElementById('searchMajor').addEventListener('input', applyFiltersAndSort);
    document.getElementById('facultySelect').addEventListener('change', applyFiltersAndSort);
    document.getElementById('sortSelect').addEventListener('change', applyFiltersAndSort);

    fetchPrograms();
</script>
</body>
</html>
